name: Refresh One Piece Card Data

on:
  schedule:
    # Runs daily at 09:00 UTC. The scraper itself alternates between
    # Group A (OP-01-08) and Group B (OP-09-16 + EB/PRB) based on the
    # day of year, so running daily gives a clean A, B, A, B... rotation
    # with each group refreshed every other day.
    - cron: "0 9 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git identity
        # Must happen BEFORE the scraper runs - scrape_cards.py now commits
        # and pushes progress every 25 cards (not just once at the end), so
        # git needs a configured identity before that script ever runs.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run scraper
        id: scrape
        env:
          TCGAPI_KEY: ${{ secrets.TCGAPI_KEY }}
        run: python scripts/scrape_cards.py
        continue-on-error: true

      - name: List data folder (debug)
        run: |
          echo "Contents of data/ after scraper run:"
          ls -la data/ || echo "data/ directory does not exist"
          echo "---"
          echo "Git status:"
          git status

      - name: Final commit of any remaining changes
        # Safety net in case the script's own incremental commits didn't
        # catch everything (e.g. it crashed between a price update and its
        # next scheduled checkpoint).
        run: |
          git add -A data/
          git status
          git diff --staged --quiet || git commit -m "Auto-refresh card data $(date -u +%Y-%m-%d)"
          git push

      - name: Fail job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "Scraper failed - see logs above and data/_debug_raw_page.html in the repo for diagnosis."
          exit 1
