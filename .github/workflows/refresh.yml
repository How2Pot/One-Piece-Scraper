name: Refresh One Piece Card Data

on:
  schedule:
    - cron: "0 9 */2 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        id: scrape
        env:
          TCGAPI_KEY: ${{ secrets.TCGAPI_KEY }}
        run: python scripts/scrape_cards.py
        continue-on-error: true

      - name: List data folder (debug)
        run: |
          echo "Contents of data/ after scraper run:"
          ls -la data/ || echo "data/ directory does not exist"
          echo "---"
          echo "Git status:"
          git status

      - name: Commit updated data (and debug dump if scrape failed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git status
          git diff --staged --quiet || git commit -m "Auto-refresh card data $(date -u +%Y-%m-%d)"
          git push

      - name: Fail job if scrape failed
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "Scraper failed — see logs above and data/_debug_raw_page.html in the repo for diagnosis."
          exit 1
