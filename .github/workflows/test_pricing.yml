name: TEST - Pricing Logic (OP-16 only)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - env:
          TCGAPI_KEY: ${{ secrets.TCGAPI_KEY }}
        run: python scripts/test_op01_pricing.py
      - run: |
          git add data/_test_op16_prices.json
          git diff --staged --quiet || git commit -m "Test: OP-16 pricing results"
          git push
