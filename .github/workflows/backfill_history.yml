name: Backfill Price History

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - env:
          TCGAPI_KEY: ${{ secrets.TCGAPI_KEY }}
        run: python scripts/backfill_history.py
      - run: |
          git add -A data/history/
          git diff --staged --quiet || git commit -m "Backfill history batch"
          git push
