name: TEST - Debug History Endpoint

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - env:
          TCGAPI_KEY: ${{ secrets.TCGAPI_KEY }}
        run: python scripts/debug_history_endpoint.py
