name: TEST - Clear Images Folder

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf data/images/ || true
          git commit -m "Clear images folder for fresh rebuild" || true
          git push
